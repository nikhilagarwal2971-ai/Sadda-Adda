function vDashboard(){
  const st=computeSettlement();
  const petty=pettyBalance(periodEnd()), kir=kiranaBalance(periodEnd());
  const REAL_NOW=(new Date()).toISOString().slice(0,7);
  const asOf=PERIOD!==REAL_NOW?(' · as of '+fmtD(periodEnd())):'';
  const monthExp=DB.expenses.filter(e=>inPeriod(e.date)).reduce((a,b)=>a+(+b.amount||0),0)+DB.kirana.filter(t=>t.kind==='purchase'&&!t.link&&inPeriod(t.date)).reduce((a,b)=>a+(+b.amount||0),0);
  const curRent=DB.rent.filter(r=>r.month===PERIOD);
  const rentDue=curRent.length>0;
  const rentPaid=rentDue&&curRent.every(r=>((+r.amount||0)-rentPaidFor(r))<0.005);
  const salPaid=DB.salary.filter(s=>s.month===PERIOD&&s.payDate).length>0;
  const salDue=DB.salary.some(s=>s.month===PERIOD);
  const owes=st.rows.filter(r=>r.net<-0.005);
  const gets=st.rows.filter(r=>r.net>0.005);

  const quick=`<div class="card" style="margin-bottom:20px"><div class="card-b" style="padding:14px 16px">
    <div class="qa-row">
      <button class="qa" onclick="expenseModal()"><span class="qa-ic">＋</span>Add expense</button>
      <button class="qa" onclick="rentModal()"><span class="qa-ic">⌂</span>Charge / pay rent</button>
      <button class="qa" onclick="pettyModal()"><span class="qa-ic">◷</span>Give cash to cook</button>
      <button class="qa" onclick="transferModal()"><span class="qa-ic">⇄</span>Member transfer</button>
      <button class="qa" onclick="go('settlement')"><span class="qa-ic">⇄</span>View settlement</button>
    </div>
  </div></div>
  <style>.qa-row{display:flex;gap:10px;flex-wrap:wrap}.qa{flex:1;min-width:150px;display:flex;align-items:center;gap:9px;justify-content:center;background:#f3eee4;border:1px solid var(--line);border-radius:9px;padding:13px 14px;font-size:13.5px;font-weight:600;color:var(--ink);cursor:pointer;font-family:inherit;transition:.12s}.qa:hover{background:#ece5d8;border-color:var(--brass)}.qa-ic{font-size:16px;color:var(--brass)}</style>`;

  const tiles=`<div class="tiles">
    <div class="tile"><div class="edge" style="background:var(--teal)"></div><div class="lab">Petty Cash Balance</div><div class="val mono ${petty<0?'neg':''}">${INR(petty)}</div><div class="meta">${petty<0?'Overdrawn':'Available with cook'}${asOf}</div></div>
    <div class="tile"><div class="edge" style="background:var(--red)"></div><div class="lab">Kirana Outstanding</div><div class="val mono ${kir>0?'neg':'pos'}">${INR(kir)}</div><div class="meta">${kir>0?'Payable to store':'Settled'}${asOf}</div></div>
    <div class="tile"><div class="edge" style="background:var(--brass)"></div><div class="lab">Expenses This Month</div><div class="val mono">${INR(monthExp)}</div><div class="meta">${DB.expenses.filter(e=>inPeriod(e.date)).length} entries</div></div>
    <div class="tile"><div class="edge" style="background:var(--ink-soft)"></div><div class="lab">Total To Share</div><div class="val mono">${INR(st.grand)}</div><div class="meta">${st.n} active member${st.n>1?'s':''}</div></div>
  </div>`;

  const statusRow=`<div class="card"><div class="card-h"><h3>Period Status — ${monthLabel(PERIOD)}</h3></div><div class="card-b">
    <div class="split3">
      <div><div class="lab" style="font-size:11px;color:var(--ink-faint);text-transform:uppercase;font-weight:600;margin-bottom:6px">Rent</div>${rentDue?(rentPaid?'<span class="pill green">Paid</span>':'<span class="pill amber">Pending</span>'):'<span class="pill gray">Not recorded</span>'}</div>
      <div><div class="lab" style="font-size:11px;color:var(--ink-faint);text-transform:uppercase;font-weight:600;margin-bottom:6px">Cook Salary</div>${salDue?(salPaid?'<span class="pill green">Paid</span>':'<span class="pill amber">Pending</span>'):'<span class="pill gray">Not recorded</span>'}</div>
      <div><div class="lab" style="font-size:11px;color:var(--ink-faint);text-transform:uppercase;font-weight:600;margin-bottom:6px">Settlement</div>${st.rows.length?'<span class="pill green">Ready</span>':'<span class="pill gray">No members</span>'}</div>
    </div></div></div>`;

  const outstanding=`<div class="split2">
    <div class="card"><div class="card-h"><h3>Members Who Should Pay</h3><span class="hint">Net payable</span></div>
      <div class="card-b" style="padding:0">${owes.length?`<table><tbody>${owes.map(r=>`<tr><td>${esc(r.name)}</td><td class="num neg mono">${INR(-r.net)}</td></tr>`).join('')}</tbody></table>`:'<div class="empty"><div class="big">○</div>Everyone is square</div>'}</div></div>
    <div class="card"><div class="card-h"><h3>Members Who Should Receive</h3><span class="hint">Net receivable</span></div>
      <div class="card-b" style="padding:0">${gets.length?`<table><tbody>${gets.map(r=>`<tr><td>${esc(r.name)}</td><td class="num pos mono">${INR(r.net)}</td></tr>`).join('')}</tbody></table>`:'<div class="empty"><div class="big">○</div>Nothing to collect</div>'}</div></div>
  </div>`;

  const expCard=monthExpenseSummary();
  // key analytics chart on the dashboard: 6-month spend trend
  const tmonths=monthRange(PERIOD,6);
  const tseries=tmonths.map(m=>({label:monthShort(m),value:monthSpend(m)}));
  const hasTrend=tseries.some(s=>s.value>0);
  const trendCard=hasTrend?`<div class="card"><div class="card-h"><h3>Spending — last 6 months</h3><button class="btn ghost sm" onclick="go('analytics')">All analytics →</button></div><div class="card-b">${svgLine(tseries,{money:true,height:170})}</div></div>`:'';
  return quick+tiles+statusRow+trendCard+carryCard()+outstanding+expCard;
}
function carryCard(){
  const prev=prevPeriod(PERIOD), startOfMonth=PERIOD+'-00';
  // Petty
  const pOpen=pettyBalance(startOfMonth), pClose=pettyBalance(periodEnd());
  // Kirana
  const kOpen=kiranaBalance(startOfMonth), kClose=kiranaBalance(periodEnd());
  // Rent payable
  const rOpen=rentPayableBalance(startOfMonth), rClose=rentPayableBalance(periodEnd());
  // Salary payable
  const sOpen=salaryPayableBalance(startOfMonth), sClose=salaryPayableBalance(periodEnd());
  const row=(name,open,close,goodLow)=>{
    const moved=close-open;
    return `<tr>
      <td><b>${name}</b></td>
      <td class="num mono">${INR(open)}</td>
      <td class="num mono ${moved>0?'pos':moved<0?'neg':''}">${moved>0?'+':''}${INR(moved)}</td>
      <td class="num mono"><b>${INR(close)}</b></td>
    </tr>`;
  };
  return `<div class="card"><div class="card-h"><h3>Balances Carried Forward</h3><span class="hint">${monthLabel(prev)} close → ${monthLabel(PERIOD)} → ${monthLabel(nextPeriod(PERIOD))} open</span></div>
    <div class="card-b" style="padding:0"><table>
      <thead><tr><th>Account</th><th class="num">Opening (from ${monthLabel(prev)})</th><th class="num">This month</th><th class="num">Closing (→ ${monthLabel(nextPeriod(PERIOD))})</th></tr></thead>
      <tbody>${row('Petty Cash',pOpen,pClose)}${row('Kirana Payable',kOpen,kClose)}${row('Rent Payable',rOpen,rClose)}${row('Salary Payable',sOpen,sClose)}</tbody>
    </table></div>
    <div class="card-b" style="border-top:1px solid var(--line-soft);font-size:12.5px;color:var(--ink-soft)">Each month's closing balance automatically becomes the next month's opening — just switch the period at the top and keep entering. Nothing needs re-entering.</div>
  </div>`;
}
function monthExpenseSummary(){
  const exp=DB.expenses.filter(e=>inPeriod(e.date));
  const byCat={};
  exp.forEach(e=>{byCat[e.category]=(byCat[e.category]||0)+(+e.amount||0);});
  const cats=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  if(!cats.length) return '';
  const max=Math.max(...cats.map(c=>c[1]));
  return `<div class="card"><div class="card-h"><h3>Expense Summary by Category</h3></div><div class="card-b">
    ${cats.map(([c,v])=>`<div style="margin-bottom:11px"><div style="display:flex;justify-content:space-between;font-size:12.5px;margin-bottom:4px"><span>${esc(c)}</span><span class="mono" style="font-weight:600">${INR(v)}</span></div><div style="height:7px;background:#efeae0;border-radius:4px;overflow:hidden"><div style="height:100%;width:${(v/max*100)}%;background:var(--brass);border-radius:4px"></div></div></div>`).join('')}
  </div></div>`;
}

/* ---------- ANALYTICS ---------- */
let ANALYTICS_WINDOW=6; // months
/* total household spend for a period: expenses + direct kirana purchases */
function monthSpend(p){
  let t=DB.expenses.filter(e=>inPeriod(e.date,p)).reduce((a,b)=>a+(+b.amount||0),0);
  t+=DB.kirana.filter(k=>k.kind==='purchase'&&!k.link&&inPeriod(k.date,p)).reduce((a,b)=>a+(+b.amount||0),0);
  return t;
}
function monthFixedVar(p){
  const exp=DB.expenses.filter(e=>inPeriod(e.date,p));
  const fixed=exp.filter(e=>e.type==='Fixed').reduce((a,b)=>a+(+b.amount||0),0);
  const variable=exp.filter(e=>e.type!=='Fixed').reduce((a,b)=>a+(+b.amount||0),0)+DB.kirana.filter(k=>k.kind==='purchase'&&!k.link&&inPeriod(k.date,p)).reduce((a,b)=>a+(+b.amount||0),0);
  return {fixed,variable};
}
function monthRentCharged(p){return DB.rent.filter(r=>r.month===p).reduce((a,b)=>a+(+b.amount||0),0);}
function monthSalaryCharged(p){return DB.salary.filter(s=>s.month===p).reduce((a,b)=>a+(+b.amount||0),0);}
function categoryTotals(months){
  const by={};
  DB.expenses.forEach(e=>{if(months.includes(e.date&&e.date.slice(0,7))){by[e.category||'Other']=(by[e.category||'Other']||0)+(+e.amount||0);}});
  DB.kirana.forEach(k=>{if(k.kind==='purchase'&&!k.link&&months.includes(k.date&&k.date.slice(0,7))){by['Kirana']=(by['Kirana']||0)+(+k.amount||0);}});
  return Object.entries(by).map(([label,value])=>({label,value})).sort((a,b)=>b.value-a.value);
}

function vAnalytics(){
  const N=ANALYTICS_WINDOW;
  const months=monthRange(PERIOD,N);
  const spend=months.map(m=>({label:monthShort(m),value:monthSpend(m)}));
  const totalWindow=spend.reduce((a,b)=>a+b.value,0);
  const avg=totalWindow/(N||1);
  // fixed vs variable grouped
  const fv=months.map(m=>monthFixedVar(m));
  const mlabels=months.map(monthShort);
  const grouped=svgGroupedBars(mlabels,[
    {name:'Fixed',color:'#5b7c99',values:fv.map(x=>x.fixed)},
    {name:'Variable',color:'#c08a52',values:fv.map(x=>x.variable)}
  ],{height:200});
  // category donut over window
  const cats=categoryTotals(months);
  const catTop=cats.slice(0,8);
  // rent / salary / payables trend
  const rentSeries={name:'Rent',color:'#2c6e63',values:months.map(monthRentCharged)};
  const salSeries={name:'Cook Salary',color:'#9a6b3f',values:months.map(monthSalaryCharged)};
  const rentSal=svgGroupedBars(mlabels,[rentSeries,salSeries],{height:200});
  // payables outstanding at each month end
  const payTrend=months.map(m=>{const eom=m+'-'+String(daysInMonth(m)).padStart(2,'0');return {label:monthShort(m),value:Math.max(0,rentPayableBalance(eom))+Math.max(0,salaryPayableBalance(eom))+Math.max(0,kiranaBalance(eom))};});
  // per-member: paid vs share this period (horizontal, names never overlap)
  const mem=activeMembers();
  const st=computeSettlement(PERIOD);
  const memGrouped=svgHGroupedBars(
    st.rows.map(r=>({label:r.name.split(' ')[0],values:[Math.round(r.paid),Math.round(r.total)]})),
    [{name:'Paid',color:'#2c6e63'},{name:'Share (owed)',color:'#b3413a'}]
  );
  // member net over time — only months that actually have activity, so lines aren't dragged flat across empty months
  const activeMonths=months.filter(p=>{
    if(monthSpend(p)>0||monthRentCharged(p)>0||monthSalaryCharged(p)>0)return true;
    const s=computeSettlement(p);return s.rows.some(r=>Math.abs(r.net)>0.5||r.paid>0.5);
  });
  const netMonths=activeMonths.length>=2?activeMonths:months.slice(-Math.min(months.length,3));
  const netLabels=netMonths.map(monthShort);
  const memNetSeries=mem.map((m,i)=>{
    const vals=netMonths.map(p=>{const s=computeSettlement(p);const row=s.rows.find(x=>x.id===m.id);return row?Math.round(row.net):0;});
    return {name:m.name.split(' ')[0],color:CHART_PAL[i%CHART_PAL.length],values:vals};
  });

  return `
  <div class="toolbar" style="margin-bottom:16px">
    <div class="seg">
      <button class="${N===3?'on':''}" onclick="ANALYTICS_WINDOW=3;render()">3 mo</button>
      <button class="${N===6?'on':''}" onclick="ANALYTICS_WINDOW=6;render()">6 mo</button>
      <button class="${N===12?'on':''}" onclick="ANALYTICS_WINDOW=12;render()">12 mo</button>
    </div>
    <div class="spacer"></div>
    <span style="font-size:12.5px;color:var(--ink-faint)">Ending ${monthLabel(PERIOD)}</span>
  </div>

  <div class="tiles" style="grid-template-columns:repeat(3,1fr)">
    <div class="tile"><div class="lab">Total spend · last ${N} mo</div><div class="val mono">${INR(totalWindow)}</div></div>
    <div class="tile"><div class="lab">Average / month</div><div class="val mono">${INR(Math.round(avg))}</div></div>
    <div class="tile"><div class="lab">This month</div><div class="val mono">${INR(monthSpend(PERIOD))}</div><div class="meta">${spendArrow(months)}</div></div>
  </div>

  <div class="card"><div class="card-h"><h3>Spending trend</h3><span class="hint">total household spend per month</span></div>
    <div class="card-b">${totalWindow>0?svgLine(spend,{money:true,height:200}):emptyChart()}</div></div>

  <div class="card"><div class="card-h"><h3>Fixed vs Variable</h3><span class="hint">split each month</span></div>
    <div class="card-b">${totalWindow>0?grouped:emptyChart()}</div></div>

  <div class="card"><div class="card-h"><h3>Where the money goes</h3><span class="hint">by category, last ${N} months</span></div>
    <div class="card-b">${catTop.length?svgDonut(catTop,{money:true}):emptyChart()}</div></div>

  <div class="card"><div class="card-h"><h3>Rent &amp; Cook Salary</h3><span class="hint">charged per month</span></div>
    <div class="card-b">${(rentSeries.values.some(v=>v)||salSeries.values.some(v=>v))?rentSal:emptyChart()}</div></div>

  <div class="card"><div class="card-h"><h3>Outstanding payables</h3><span class="hint">rent + salary + kirana owed, at each month end</span></div>
    <div class="card-b">${payTrend.some(p=>p.value>0)?svgBars(payTrend,{money:true,height:180,color:'#b3413a'}):emptyChart()}</div></div>

  <div class="card"><div class="card-h"><h3>Members — paid vs share</h3><span class="hint">${monthLabel(PERIOD)}</span></div>
    <div class="card-b">${st.rows.length?memGrouped:emptyChart()}</div></div>

  <div class="card"><div class="card-h"><h3>Net position this month</h3><span class="hint">${monthLabel(PERIOD)} · right = receives, left = pays</span></div>
    <div class="card-b">${st.rows.length?svgDivergingBars(st.rows.map(r=>({label:r.name.split(' ')[0],value:Math.round(r.net)}))):emptyChart()}</div></div>

  <div class="card"><div class="card-h"><h3>Member net position over time</h3><span class="hint">above 0 = should receive · below 0 = should pay</span></div>
    <div class="card-b">${st.rows.length&&netMonths.length>=2?svgMultiLine(netLabels,memNetSeries,{height:230}):'<div class="empty" style="padding:24px"><div class="big">📈</div>Needs at least two months of activity to plot a trend. Keep logging months and this will fill in.</div>'}</div></div>

  <div class="note"><span class="i">i</span><span>Charts cover the <b>${N} months ending ${monthLabel(PERIOD)}</b> — change the period at the top-right or the range above. "Spend" combines expenses and kirana credit purchases. Hover any bar or slice for the exact figure.</span></div>`;
}
function spendArrow(months){
  if(months.length<2)return '';
  const cur=monthSpend(months[months.length-1]),prev=monthSpend(months[months.length-2]);
  if(prev===0)return '';
  const pct=Math.round((cur-prev)/prev*100);
  if(pct>0)return `<span style="color:var(--red)">▲ ${pct}% vs last month</span>`;
  if(pct<0)return `<span style="color:var(--green)">▼ ${Math.abs(pct)}% vs last month</span>`;
  return 'same as last month';
}
function emptyChart(){return '<div class="empty" style="padding:30px"><div class="big">📊</div>No data in this range yet. Add some entries or widen the range.</div>';}

/* ---------- MEMBERS ---------- */
function vMembers(){
  const rows=DB.members.map(m=>{
    const active=activeMembers().some(a=>a.id===m.id);
    const dp=active?daysPresent(m):0;
    return `<tr>
      <td class="mono" style="color:var(--ink-faint)">${esc(m.id.slice(-5).toUpperCase())}</td>
      <td><b>${esc(m.name)}</b></td>
      <td class="mono">${esc(m.mobile||'—')}</td>
      <td>${fmtD(m.joinDate)}</td>
      <td>${m.exitDate?fmtD(m.exitDate):'<span style="color:var(--ink-faint)">—</span>'}</td>
      <td>${m.status==='Active'?'<span class="pill green">Active</span>':'<span class="pill gray">Inactive</span>'}</td>
      <td class="num"><b>${active?dp:'—'}</b> ${active?'<span style="color:var(--ink-faint);font-size:11px">/ '+daysInMonth(PERIOD)+'</span>':''}</td>

    </tr>`;
  }).join('');
  return `<div class="card">
    <div class="card-h"><h3>Member Roster</h3><button class="btn sm" onclick="memberModal()">+ Add Member</button></div>
    <div class="card-b" style="padding:0">
      ${DB.members.length?`<table><thead><tr><th>ID</th><th>Name</th><th>Mobile</th><th>Joined</th><th>Exited</th><th>Status</th><th class="num">Days Present (${monthLabel(PERIOD)})</th><th></th></tr></thead><tbody>${rows}</tbody></table>`:'<div class="empty"><div class="big">◍</div>No members yet. Add your flatmates to begin.</div>'}
    </div></div>
    <div class="note"><span class="i">i</span><span>"Days Present" drives <b>variable</b> expense allocation. Mark daily presence on the <b>Attendance</b> sheet for precise splits; otherwise it's auto-calculated from join/exit dates, or you can set a manual override per member.</span></div>

    <div class="card"><div class="card-h"><h3>Water provision (monthly)</h3></div><div class="card-b">
      <p style="font-size:13.5px;color:var(--ink-soft);margin-bottom:14px">A fixed amount set aside per member every month, charged equally and accumulated as a <b>Water Payable</b> liability — useful for smoothing an irregular water bill. When on, it appears as a column in the settlement and in the books.</p>
      <div class="split2" style="align-items:end">
        <div><label class="fld">Amount per member / month (₹)</label><input type="number" id="water_amt" value="${(+((DB.settings&&DB.settings.waterPerMember))||0)}" min="0"></div>
        <div><label class="fld">Status</label>
          <div style="display:flex;gap:10px">
            <button class="btn ${DB.settings&&DB.settings.waterOn?'':'ghost'} sm" onclick="setWater(true)">On</button>
            <button class="btn ${DB.settings&&DB.settings.waterOn?'ghost':''} sm" onclick="setWater(false)">Off</button>
          </div>
        </div>
      </div>
      <p style="font-size:12px;color:var(--ink-faint);margin-top:12px">Currently: <b>${DB.settings&&DB.settings.waterOn?('ON — ₹'+(+DB.settings.waterPerMember||0)+'/member, ₹'+((+DB.settings.waterPerMember||0)*activeMembers().length)+'/month for '+activeMembers().length+' active members'):'OFF'}</b>. Changing the amount applies to all months (the provision is recalculated).</p>
    </div></div>`;
}
function setWater(on){
  const before={...(DB.settings||{})};
  DB.settings=DB.settings||{waterPerMember:200,waterOn:false};
  const amt=parseFloat(val('water_amt'));
  if(!isNaN(amt)&&amt>=0)DB.settings.waterPerMember=amt;
  DB.settings.waterOn=!!on;
  logAudit('update','settings','water','Water provision turned '+(on?'ON':'OFF')+' at ₹'+DB.settings.waterPerMember+'/member',{waterOn:before.waterOn,waterPerMember:before.waterPerMember},{waterOn:DB.settings.waterOn,waterPerMember:DB.settings.waterPerMember});
  save();toast(on?'Water provision turned on':'Water provision turned off');render();
}
function memberModal(id){
  const m=id?DB.members.find(x=>x.id===id):{name:'',mobile:'',joinDate:'',exitDate:'',status:'Active',daysOverride:{}};
  const override=(m.daysOverride&&m.daysOverride[PERIOD]!=null)?m.daysOverride[PERIOD]:'';
  openModal(id?'Edit Member':'Add Member',`
    <div class="row"><label class="fld">Member Name</label><input id="m_name" value="${esc(m.name)}" placeholder="e.g. Rahul Sharma"></div>
    <div class="split2" style="margin-top:14px">
      <div><label class="fld">Mobile Number</label><input id="m_mobile" value="${esc(m.mobile||'')}" placeholder="10-digit"></div>
      <div><label class="fld">Status</label><select id="m_status"><option ${m.status==='Active'?'selected':''}>Active</option><option ${m.status==='Inactive'?'selected':''}>Inactive</option></select></div>
    </div>
    <div class="split2" style="margin-top:14px">
      <div><label class="fld">Joining Date</label><input type="date" id="m_join" value="${esc(m.joinDate||'')}"></div>
      <div><label class="fld">Exit Date (if left)</label><input type="date" id="m_exit" value="${esc(m.exitDate||'')}"></div>
    </div>
    <div style="margin-top:14px"><label class="fld">Days Present — override for ${monthLabel(PERIOD)} (optional)</label><input type="number" id="m_days" value="${override}" placeholder="Auto: ${id?daysPresent(m):daysInMonth(PERIOD)} days"></div>
  `,()=>{
    const name=val('m_name').trim();
    if(!name){toast('Name is required',false);return false;}
    const data={name,mobile:val('m_mobile').trim(),status:val('m_status'),joinDate:val('m_join'),exitDate:val('m_exit')};
    const dov=val('m_days').trim();
    if(id){
      const t=DB.members.find(x=>x.id===id);const before=auditSnap(t);Object.assign(t,data);
      t.daysOverride=t.daysOverride||{};
      if(dov==='')delete t.daysOverride[PERIOD];else t.daysOverride[PERIOD]=+dov;
      logAudit('update','member',id,describeRecord('members',t),before,auditSnap(t));
    }else{
      const nm={id:uid('M'),...data,daysOverride:{}};
      if(dov!=='')nm.daysOverride[PERIOD]=+dov;
      DB.members.push(nm);
      logAudit('create','member',nm.id,describeRecord('members',nm),null,auditSnap(nm));
    }
    save();toast('Member saved');render();return true;

const ATTACH_MAX_BYTES=1.5*1024*1024; // ~1.5MB cap per attachment after any compression

/* Compress an image file via canvas before storing, so a multi-MB phone photo
   becomes a reasonably small base64 string. PDFs cannot be compressed this way,
   so they're size-capped instead and rejected if too large. */
function readAttachmentFile(file){
  return new Promise((resolve,reject)=>{
    if(file.type==='application/pdf'){
      if(file.size>ATTACH_MAX_BYTES){reject(new Error('PDF is '+(file.size/1024/1024).toFixed(1)+'MB — please attach a smaller file (under 1.5MB) since it cannot be compressed automatically.'));return;}
      const r=new FileReader();
      r.onload=()=>resolve({mime:'application/pdf',data:r.result,name:file.name});
      r.onerror=()=>reject(new Error('Could not read file'));
      r.readAsDataURL(file);
      return;
    }
    if(!file.type.startsWith('image/')){reject(new Error('Only photos (jpg/png) or PDF files can be attached'));return;}
    const img=new Image();
    const reader=new FileReader();
    reader.onload=()=>{
      img.onload=()=>{
        const maxDim=1400; // cap longest side, keeps receipts legible but small
        let w=img.width,h=img.height;
        if(w>h&&w>maxDim){h=Math.round(h*maxDim/w);w=maxDim;}
        else if(h>maxDim){w=Math.round(w*maxDim/h);h=maxDim;}
        const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        let quality=0.82;
        let dataUrl=canvas.toDataURL('image/jpeg',quality);
        // step quality down if still too large
        while(dataUrl.length*0.75>ATTACH_MAX_BYTES&&quality>0.4){quality-=0.12;dataUrl=canvas.toDataURL('image/jpeg',quality);}
        if(dataUrl.length*0.75>ATTACH_MAX_BYTES){reject(new Error('Photo is still too large after compression — try a different photo'));return;}
        resolve({mime:'image/jpeg',data:dataUrl,name:file.name});
      };
      img.onerror=()=>reject(new Error('Could not read image'));
      img.src=reader.result;
    };
    reader.onerror=()=>reject(new Error('Could not read file'));
    reader.readAsDataURL(file);
  });
}

/* ---------- RENT (PAYABLE ACCOUNT) ---------- */
/* outstanding rent payable to landlord as at a date (opening arrears + charges − payments) */
function rentPayableBalance(upto){
  let bal=0;
  const op=DB.opening;
  if(op&&op.rentPayable&&(!op.date||!upto||op.date.slice(0,7)<=upto.slice(0,7))){
    bal+=(+op.rentPayable||0);
    (op.rentPayments||[]).forEach(p=>{if(!upto||(p.date||op.date)<=upto)bal-=(+p.amount||0);});
  }
  DB.rent.forEach(r=>{
    const cd=r.dueDate||(r.month+'-01');
    if(!upto||cd<=upto)bal+=(+r.amount||0);
    (r.payments||[]).forEach(p=>{if(!upto||(p.date||cd)<=upto)bal-=(+p.amount||0);});
  });
  return bal;
}
function openingArrearsPaid(){return (DB.opening.rentPayments||[]).reduce((a,p)=>a+(+p.amount||0),0);}
function rentPaidFor(r){return (r.payments||[]).reduce((a,p)=>a+(+p.amount||0),0);}
function rentChargedTotal(upto){let t=(DB.opening&&+DB.opening.rentPayable||0);DB.rent.forEach(r=>{const cd=r.dueDate||(r.month+'-01');if(!upto||cd<=upto)t+=(+r.amount||0);});return t;}

  // ledger rows: each month shows charged, paid-so-far, balance for that month
  const ledger=rows.map(r=>{

  }).join('');
  // opening arrears row — carried-in balance from before the app was used, with its own payment history
  const arrPaid=openingArrearsPaid();const arrBal=openArrears-arrPaid;
  const arrRow=openArrears>0.005?(()=>{
    const status=arrBal<0.005?'<span class="pill green">Cleared</span>':arrPaid>0.005?'<span class="pill amber">Part-paid</span>':'<span class="pill red">Unpaid</span>';

  })():'';

  const statusTiles=`<div class="tiles" style="grid-template-columns:repeat(4,1fr)">
      <div class="tile"><div class="lab">Rent for ${monthLabel(PERIOD)}</div><div class="val mono">${INR(curTot)}</div><div class="meta">${mem.length} active · ${INR(share)} each</div></div>
      <div class="tile"><div class="edge" style="background:var(--red)"></div><div class="lab">Total Rent Payable (now)</div><div class="val mono ${outstandingNow>0.005?'neg':'pos'}">${INR(Math.max(0,outstandingNow))}</div><div class="meta">to landlord, all months</div></div>
      <div class="tile"><div class="lab">Opening Arrears</div><div class="val mono">${INR(openArrears)}</div><div class="meta">carried in${DB.opening&&DB.opening.date?' @ '+fmtD(DB.opening.date):''}</div></div>
      <div class="tile"><div class="lab">Member Rent Share</div><div class="val mono">${INR(share)}</div><div class="meta">each, this month</div></div>
    </div>`;

  // member-wise share vs paid (this month)
  const payableRows=mem.map(m=>{const paid=rentContributed(m.id,PERIOD);return {name:m.name,share,paid,outstanding:share-paid};});
  const totPaid=payableRows.reduce((a,r)=>a+r.paid,0);
  const totOut=payableRows.reduce((a,r)=>a+r.outstanding,0);
  const payableCard=cur.length?`<div class="card"><div class="card-h"><h3>Member-wise Rent Share — ${monthLabel(PERIOD)}</h3><div class="toolbar"><span class="hint">share − paid = owing</span><button class="btn ghost sm" onclick="exportRentPayable()">Export</button></div></div>
    <div class="card-b" style="padding:0"><table>
      <thead><tr><th>Member</th><th class="num">Rent Share</th><th class="num">Paid Toward Rent</th><th class="num">Owing</th><th>Status</th></tr></thead>
      <tbody>${payableRows.map(r=>`<tr><td><b>${esc(r.name)}</b></td><td class="num mono">${INR(r.share)}</td><td class="num mono">${INR(r.paid)}</td><td class="num mono ${r.outstanding>0.005?'neg':r.outstanding<-0.005?'pos':''}">${INR(r.outstanding)}</td><td>${r.outstanding>0.005?'<span class="pill amber">Owes</span>':r.outstanding<-0.005?'<span class="pill green">Overpaid</span>':'<span class="pill green">Clear</span>'}</td></tr>`).join('')}</tbody>
      <tfoot class="ledger-foot"><tr><td>Total</td><td class="num mono">${INR(share*mem.length)}</td><td class="num mono">${INR(totPaid)}</td><td class="num mono">${INR(totOut)}</td><td></td></tr></tfoot>
    </table></div></div>`:'';

  return `${statusTiles}
  <div class="note"><span class="i">i</span><span>Rent is <b>charged every month</b> as a payable on its due date and stays outstanding until paid — payments can come <b>months later</b>, in parts, by any member. Each payment reduces the <b>Rent Payable</b> balance. Carry in earlier arrears via <b>Opening Balances</b>.</span></div>
  <div class="card"><div class="card-h"><h3>Rent Payable Ledger</h3><button class="btn sm" onclick="rentModal()">+ Add / Charge Rent</button></div>
    <div class="card-b" style="padding:0">${(rows.length||openArrears>0.005)?`<table><thead><tr><th class="audit-h" title="Verified">✓</th><th>Month / Payments</th><th class="num">Charged</th><th>Due</th><th class="num">Paid</th><th class="num">Balance</th><th>Status</th><th></th></tr></thead><tbody>${arrRow}${ledger}</tbody>
    <tfoot class="ledger-foot"><tr><td></td><td>Outstanding to landlord</td><td colspan="3"></td><td class="num mono">${INR(Math.max(0,outstandingNow))}</td><td colspan="2"></td></tr></tfoot></table>`:'<div class="empty"><div class="big">⌂</div>No rent charged yet.</div>'}</div></div>
  ${payableCard}`;
}
/* Opening arrears (rent or salary) — payments toward the pre-app carried-in balance */

  const total=isRent?(+DB.opening.rentPayable||0):(+DB.opening.salaryPayable||0);

  const memOpts=()=>DB.members.map(m=>`<option value="${m.id}">${esc(m.name)}</option>`).join('');
  const payList=list.map(p=>`<tr><td>${fmtD(p.date)}</td><td class="num mono">${INR(p.amount)}</td><td>${esc(memberName(p.paidBy))}</td><td class="num"><button class="lnk del" onclick="openingArrearsDelPay('${kind}','${p.id}')">Del</button></td></tr>`).join('');

    <div class="split3" style="align-items:end">

function openingArrearsAddPay(kind){
  const isRent=kind==='rent';
  const amt=+val('oa_amt');if(!amt||amt<=0){toast('Enter payment amount',false);return;}
  const by=val('oa_by');if(!by){toast('Select who paid',false);return;}
  const payDate=val('oa_date');
  if(blockedByLock(payDate))return;
  const arr=isRent?(DB.opening.rentPayments=DB.opening.rentPayments||[]):(DB.opening.salaryPayments=DB.opening.salaryPayments||[]);
  const pay={id:uid('OAP'),date:payDate,amount:amt,paidBy:by};
  arr.push(pay);
  logAudit('create',isRent?'rentArrears':'salaryArrears',pay.id,'Opening '+(isRent?'rent':'salary')+' arrears payment '+INR(amt)+' by '+memberName(by),null,pay);
  save();toast('Payment recorded');openingArrearsModal(kind);render();
}
function openingArrearsDelPay(kind,pid){
  const isRent=kind==='rent';
  const arr=isRent?DB.opening.rentPayments:DB.opening.salaryPayments;
  const pay=(arr||[]).find(p=>p.id===pid);
  if(pay&&blockedByLock(pay.date))return;
  if(isRent)DB.opening.rentPayments=(arr||[]).filter(p=>p.id!==pid);
  else DB.opening.salaryPayments=(arr||[]).filter(p=>p.id!==pid);
  if(pay)logAudit('delete',isRent?'rentArrears':'salaryArrears',pid,'Opening '+(isRent?'rent':'salary')+' arrears payment '+INR(pay.amount)+' by '+memberName(pay.paidBy)+' removed',pay,null);
  save();toast('Removed');openingArrearsModal(kind);render();
}
function rentContributed(id,p=PERIOD){
  // from rent payment legs made by this member within the period
  let t=0;
  DB.rent.forEach(r=>{(r.payments||[]).forEach(pp=>{if(pp.paidBy===id&&inPeriod(pp.date,p))t+=(+pp.amount||0);});});
  return t;
}
function exportRentPayable(){
  const mem=activeMembers();const cur=DB.rent.filter(r=>r.month===PERIOD);
  const curTot=cur.reduce((a,b)=>a+(+b.amount||0),0);const share=mem.length?curTot/mem.length:0;
  const rows=mem.map(m=>{const paid=rentContributed(m.id,PERIOD);return{Member:m.name,'Rent Share':share,'Paid Toward Rent':paid,'Owing':share-paid};});

function rentAddPay(id){

function rentDelPay(id,pid){

  if(pay&&blockedByLock(pay.date))return;

}

/* ---------- SALARY (PAYABLE ACCOUNT) ---------- */
function salPaidFor(s){return (s.payments||[]).filter(p=>p.reducesSalary!==false||p.kind!=='other').reduce((a,p)=>a+(+p.amount||0),0);}
function salOtherFor(s){return (s.payments||[]).filter(p=>p.kind==='other'&&p.reducesSalary===false).reduce((a,p)=>a+(+p.amount||0),0);}
function vSalary(){
  const rows=DB.salary.slice().sort((a,b)=>b.month.localeCompare(a.month));
  const cur=DB.salary.filter(s=>s.month===PERIOD);
  const curTot=cur.reduce((a,b)=>a+(+b.amount||0),0);
  const mem=activeMembers();const share=mem.length?curTot/mem.length:0;
  const salOutstanding=salaryPayableBalance(periodEnd());
  const openArrears=(DB.opening&&+DB.opening.salaryPayable)||0;

  const ledger=rows.map(s=>{
    const paid=salPaidFor(s);const other=salOtherFor(s);const bal=(+s.amount||0)-paid;
    const status=bal<0.005?'<span class="pill green">Cleared</span>':paid>0.005?'<span class="pill amber">Part-paid</span>':'<span class="pill red">Unpaid</span>';
    const pays=(s.payments||[]).length?`<div style="font-size:11px;color:var(--ink-faint);margin-top:3px">${s.payments.map(p=>fmtD(p.date)+' · '+INR(p.amount)+(p.paidBy?' ('+memberName(p.paidBy)+')':'')+(p.kind==='other'?(p.reducesSalary===false?' · extra':' · advance'):'')).join('<br>')}</div>`:'';
    return `<tr><td class="audit-c">${tickCell(s.id)}</td><td><b>${monthLabel(s.month)}</b>${pays}</td><td class="num mono">${INR(s.amount)}</td><td class="num mono">${INR(paid)}</td><td class="num mono ${bal>0.005?'neg':''}">${INR(bal)}</td><td class="num mono">${other?INR(other):'—'}</td><td>${status}</td><td class="num">${bal>0.005?`<button class="lnk" style="color:var(--green);font-weight:600" onclick="salModal('${s.id}')">Pay</button>`:''}<button class="lnk" onclick="salModal('${s.id}')">Edit</button><button class="lnk del" onclick="delRow('salary','${s.id}')">Del</button></td></tr>`;
  }).join('');
  // opening arrears row for salary, same pattern as rent
  const arrPaidS=(DB.opening.salaryPayments||[]).reduce((a,p)=>a+(+p.amount||0),0);const arrBalS=openArrears-arrPaidS;
  const arrRowS=openArrears>0.005?(()=>{
    const status=arrBalS<0.005?'<span class="pill green">Cleared</span>':arrPaidS>0.005?'<span class="pill amber">Part-paid</span>':'<span class="pill red">Unpaid</span>';
    const pays=(DB.opening.salaryPayments||[]).length?`<div style="font-size:11px;color:var(--ink-faint);margin-top:3px">${DB.opening.salaryPayments.map(p=>fmtD(p.date)+' · '+INR(p.amount)+(p.paidBy?' ('+memberName(p.paidBy)+')':'')).join('<br>')}</div>`:'';
    return `<tr style="background:var(--bg-soft,#f7f3ec)"><td></td><td><b>Opening Arrears</b><div style="font-size:11px;color:var(--ink-faint)">carried in${DB.opening.date?' @ '+fmtD(DB.opening.date):''}</div>${pays}</td><td class="num mono">${INR(openArrears)}</td><td class="num mono">${INR(arrPaidS)}</td><td class="num mono ${arrBalS>0.005?'neg':''}">${INR(arrBalS)}</td><td class="num mono">—</td><td>${status}</td><td class="num"><button class="lnk" onclick="openingArrearsModal('salary')">Pay / Edit</button></td></tr>`;
  })():'';

  const tiles=`<div class="tiles" style="grid-template-columns:repeat(3,1fr)">
      <div class="tile"><div class="lab">Salary for ${monthLabel(PERIOD)}</div><div class="val mono">${INR(curTot)}</div><div class="meta">${mem.length} active · ${INR(share)} each</div></div>
      <div class="tile"><div class="edge" style="background:${salOutstanding>0.005?'var(--amber)':'var(--teal)'}"></div><div class="lab">Salary Payable (now)</div><div class="val mono ${salOutstanding>0.005?'neg':'pos'}">${INR(Math.max(0,salOutstanding))}</div><div class="meta">unpaid to cook, all months</div></div>
      <div class="tile"><div class="lab">Opening Arrears</div><div class="val mono">${INR(openArrears)}</div><div class="meta">carried in${DB.opening&&DB.opening.date?' @ '+fmtD(DB.opening.date):''}</div></div>
    </div>`;
  const sharebox=cur.length?`<div class="card"><div class="card-h"><h3>Member-wise Salary Share — ${monthLabel(PERIOD)}</h3><span class="hint">${INR(curTot)} ÷ ${mem.length} active</span></div><div class="card-b" style="padding:0"><table><tbody>${mem.map(m=>`<tr><td>${esc(m.name)}</td><td class="num mono">${INR(share)}</td></tr>`).join('')}</tbody></table></div></div>`:'';

  return `${tiles}
  <div class="note"><span class="i">i</span><span>Cook salary is <b>charged every month</b> as a payable and stays outstanding until paid. Record (1) the <b>monthly salary</b>, (2) <b>payments</b> against it (any member, any date — can be partial or late), and (3) <b>other payments</b> like advances or bonus. An "extra" other payment is borne only by the member who made it, not split.</span></div>
  <div class="card"><div class="card-h"><h3>Cook Salary Account</h3><button class="btn sm" onclick="salModal()">+ Add / Charge Salary</button></div>
    <div class="card-b" style="padding:0">${(rows.length||openArrears>0.005)?`<table><thead><tr><th class="audit-h" title="Verified">✓</th><th>Month / Payments</th><th class="num">Salary Charged</th><th class="num">Paid</th><th class="num">Balance</th><th class="num">Other Pmts</th><th>Status</th><th></th></tr></thead><tbody>${arrRowS}${ledger}</tbody>
    <tfoot class="ledger-foot"><tr><td></td><td>Outstanding to cook</td><td colspan="2"></td><td class="num mono">${INR(Math.max(0,salOutstanding))}</td><td colspan="3"></td></tr></tfoot></table>`:'<div class="empty"><div class="big">♨</div>No salary charged yet.</div>'}</div></div>
  ${sharebox}`;
}
/* outstanding cook salary payable as at a date: opening arrears + charged − salary-reducing payments */
function salaryPayableBalance(upto){
  let bal=0;
  const op=DB.opening;
  if(op&&op.salaryPayable&&(!op.date||!upto||op.date.slice(0,7)<=upto.slice(0,7))){
    bal+=(+op.salaryPayable||0);
    (op.salaryPayments||[]).forEach(p=>{if(!upto||(p.date||op.date)<=upto)bal-=(+p.amount||0);});
  }
  DB.salary.forEach(s=>{
    const cd=s.month+'-01';
    if(!upto||cd<=upto)bal+=(+s.amount||0);
    (s.payments||[]).forEach(p=>{
      if(p.kind==='other'&&p.reducesSalary===false)return; // extra payments don't reduce salary owed
      if(!upto||(p.date||cd)<=upto)bal-=(+p.amount||0);
    });
  });
  return bal;
}
function salModal(id){
  const s=id?DB.salary.find(x=>x.id===id):{month:PERIOD,amount:'',remarks:'',payments:[]};
  const memOpts=DB.members.map(m=>`<option value="${m.id}">${esc(m.name)}</option>`).join('');

  const payList=(s.payments||[]).map(p=>`<tr><td>${fmtD(p.date)}</td><td class="num mono">${INR(p.amount)}</td><td>${esc(memberName(p.paidBy))}</td><td>${p.kind==='other'?(p.reducesSalary===false?'<span class="pill amber">Extra</span>':'<span class="pill gray">Advance</span>'):'<span class="pill green">Salary</span>'}</td><td class="num"><button class="lnk del" onclick="salDelPay('${id||'NEW'}','${p.id}')">Del</button></td></tr>`).join('');
  const payHdr=id?`Payments to cook — salary paid ${INR(paid)} of ${INR(charged)}, ${bal>0.005?INR(bal)+' still owed':'cleared'}`:'Record a payment now (optional)';
  openModal(id?'Edit Cook Salary — '+monthLabel(s.month):'Charge Cook Salary',`
    <div class="split2"><div><label class="fld">Month</label><input type="month" id="s_month" value="${esc(s.month)}"></div><div><label class="fld">Monthly Salary (charged)</label><input type="number" id="s_amt" value="${s.amount}" placeholder="amount due to cook"></div></div>

      ${!id?'<p style="font-size:12px;color:var(--ink-soft);margin-bottom:12px">Fill this in to record a payment along with the charge — or leave it blank and just save the salary as unpaid. You can always add more payments later.</p>':''}
      <div class="split2" style="align-items:end">
        <div><label class="fld">Pay Date</label><input type="date" id="sp_date" value="${PERIOD}-${String(new Date().getDate()).padStart(2,'0')}"></div>
        <div><label class="fld">Amount</label><input type="number" id="sp_amt" placeholder="${bal>0?bal:'leave blank if unpaid'}"></div>
      </div>
      <div class="split2" style="align-items:end;margin-top:12px">
        <div><label class="fld">Paid By Member</label><select id="sp_by"><option value="">— select —</option>${memOpts}</select></div>
        <div><label class="fld">Type of Payment</label><select id="sp_kind" onchange="document.getElementById('spOtherWrap').style.display=this.value==='other'?'block':'none'"><option value="salary">Salary payment</option><option value="other">Other (advance / bonus / extra)</option></select></div>
      </div>
      <div id="spOtherWrap" style="display:none;margin-top:12px"><label class="fld">Does this reduce the salary owed?</label><select id="sp_reduce"><option value="no">No — extra on top (borne only by the payer)</option><option value="yes">Yes — it's an advance against salary (reduces what's owed, shared)</option></select></div>
      ${id?'<button class="btn ghost sm" style="margin-top:12px" onclick="salAddPay(\''+id+'\')">+ Add this payment</button>':''}
    </div>
  `,()=>{

    let sid;
    if(id){const rec=DB.salary.find(x=>x.id===id);if(blockedByLock(rec.month+'-01')||blockedByLock(data.month+'-01'))return false;const before=auditSnap(rec);Object.assign(rec,data);sid=id;logAudit('update','salary',id,describeRecord('salary',rec),before,auditSnap(rec));}
    else{if(blockedByLock(data.month+'-01'))return false;sid=uid('S');const ns={id:sid,...data,payments:[]};DB.salary.push(ns);logAudit('create','salary',sid,describeRecord('salary',ns),null,auditSnap(ns));}

function salAddPay(id){
  const s=DB.salary.find(x=>x.id===id);if(!s)return;
  const amt=+val('sp_amt');if(!amt||amt<=0){toast('Enter payment amount',false);return;}
  const by=val('sp_by');if(!by){toast('Select who paid',false);return;}
  const payDate=val('sp_date');
  if(blockedByLock(payDate))return;
  const kind=val('sp_kind');
  const reducesSalary=kind==='other'?(val('sp_reduce')==='yes'):true;
  s.payments=s.payments||[];
  const pay={id:uid('SP'),date:payDate,amount:amt,paidBy:by,kind,reducesSalary,remarks:''};
  s.payments.push(pay);
  logAudit('create','salaryPayment',pay.id,'Salary payment '+INR(amt)+' by '+memberName(by)+' for '+monthLabel(s.month),null,pay);
  save();toast('Payment added');salModal(id);
}
function salDelPay(id,pid){
  const s=DB.salary.find(x=>x.id===id);if(!s)return;
  const pay=(s.payments||[]).find(p=>p.id===pid);
  if(pay&&blockedByLock(pay.date))return;
  s.payments=(s.payments||[]).filter(p=>p.id!==pid);
  if(pay)logAudit('delete','salaryPayment',pid,'Salary payment '+INR(pay.amount)+' by '+memberName(pay.paidBy)+' for '+monthLabel(s.month)+' removed',pay,null);
  save();toast('Payment removed');salModal(id);
}
/* auto-log a member contribution when rent/salary is paid by a member */
function autoContrib(rowId,data,purpose,tag){
  const linkKey=tag+':'+rowId;
  DB.contrib=DB.contrib.filter(c=>c.link!==linkKey);
  if(data.paidBy&&data.amount>0){
    const date=data.payDate||(data.month?data.month+'-01':PERIOD+'-01');
    DB.contrib.push({id:uid('C'),link:linkKey,date,memberId:data.paidBy,particulars:purpose+' — '+monthLabel(data.month||PERIOD),amount:data.amount,purpose});
  }
}

/* ---------- MEMBER ACCOUNTS (auto-linked statement) ---------- */
let MA_MEMBER=null;
function memberLedgerLines(id,scope){
  // pull from the journal: every line touching this member's account
  const J=buildJournal();
  const out=[];
  J.forEach(en=>{
    if(scope==='period'&&!inPeriod(en.date,PERIOD))return;
    if(scope==='upto'&&en.date>periodEnd())return;
    en.lines.forEach(l=>{
      if(l.acct.member===id){
        out.push({date:en.date,ref:en.ref,narration:en.narration,dr:+l.dr||0,cr:+l.cr||0});
      }
    });
  });
  out.sort((a,b)=>(a.date||'').localeCompare(b.date||'')||a.ref.localeCompare(b.ref));
  return out;
}
const REFLABEL={EXP:'Expense paid',PCASH:'Petty cash given',KIRANA:'Kirana payment',RENT:'Rent',RENTPAY:'Rent paid',SAL:'Salary paid',CONTR:'Contribution',XFER:'Transfer',ALLOC:'Share of expenses',OPEN:'Opening'};
function vMemberAcct(){
  if(!DB.members.length)return '<div class="card"><div class="empty"><div class="big">⊡</div>Add members first.</div></div>';
  if(!MA_MEMBER||!DB.members.find(m=>m.id===MA_MEMBER))MA_MEMBER=DB.members[0].id;
  const picker=DB.members.map(m=>`<option value="${m.id}" ${MA_MEMBER===m.id?'selected':''}>${esc(m.name)}</option>`).join('');
  const scopeSeg=`<div class="seg"><button class="${MA_SCOPE==='period'?'on':''}" onclick="MA_SCOPE='period';render()">${monthLabel(PERIOD)}</button><button class="${MA_SCOPE==='upto'?'on':''}" onclick="MA_SCOPE='upto';render()">All up to ${monthLabel(PERIOD)}</button></div>`;
  const lines=memberLedgerLines(MA_MEMBER,MA_SCOPE);
  let run=0;
  const body=lines.map(l=>{
    run+=l.cr-l.dr; // member account is credit-normal: cr increases what flat owes them
    const credits=l.cr>0, label=REFLABEL[l.ref]||l.ref;
    return `<tr>
      <td>${fmtD(l.date)}</td>
      <td><span class="pill gray">${esc(label)}</span> ${esc(l.narration)}</td>
      <td class="num mono">${l.cr>0?INR(l.cr):''}</td>
      <td class="num mono">${l.dr>0?INR(l.dr):''}</td>
      <td class="num mono">${INR(Math.abs(run))} ${run>=0?'Cr':'Dr'}</td>
    </tr>`;
  }).join('');
  const totCr=lines.reduce((a,l)=>a+l.cr,0), totDr=lines.reduce((a,l)=>a+l.dr,0);
  const net=totCr-totDr;
  const verdict=net>0.005?`<span class="pill green">Flat owes ${esc(memberName(MA_MEMBER))} ${INR(net)}</span>`:net<-0.005?`<span class="pill red">${esc(memberName(MA_MEMBER))} owes the flat ${INR(-net)}</span>`:'<span class="pill gray">Settled</span>';

  return `<div class="toolbar" style="margin-bottom:16px">
      <select style="width:auto;min-width:180px" onchange="MA_MEMBER=this.value;render()">${picker}</select>
      ${scopeSeg}<div class="spacer"></div>
      <button class="btn ghost sm" onclick="transferModal()">⇄ Member-to-member transfer</button>
      <button class="btn sm" onclick="contribModal()">+ Add entry</button>
    </div>
  <div class="note"><span class="i">i</span><span>Everything here is <b>automatic</b>. When ${esc(memberName(MA_MEMBER))} pays an expense, funds petty cash, pays rent/kirana, or receives a transfer, the entry lands here on its own — you enter it once on the relevant screen. <b>Cr</b> = the flat owes them; <b>Dr</b> = they owe the flat.</span></div>
  <div class="card"><div class="card-h"><h3>${esc(memberName(MA_MEMBER))} — Account Statement</h3>${verdict}</div>
    <div class="card-b" style="padding:0">${lines.length?`<table>
      <thead><tr><th>Date</th><th>Particulars</th><th class="num">Paid in / for flat (Cr)</th><th class="num">Charged to them (Dr)</th><th class="num">Balance</th></tr></thead>
      <tbody>${body}</tbody>
      <tfoot class="ledger-foot"><tr><td colspan="2">Totals</td><td class="num mono">${INR(totCr)}</td><td class="num mono">${INR(totDr)}</td><td class="num mono">${INR(Math.abs(net))} ${net>=0?'Cr':'Dr'}</td></tr></tfoot>
    </table>`:'<div class="empty"><div class="big">⊡</div>No activity for this member in this scope.</div>'}</div></div>
  <div class="bal-strip" style="padding:0 4px"><span>Legend: <span class="pill gray">Expense paid</span> they fronted a cost · <span class="pill gray">Share of expenses</span> their portion charged · <span class="pill gray">Transfer</span> money moved between members</span></div>`;
}

function strayPaymentContribs(){

function strayPaymentWarning(strays){

    const monthPicker=opts.length?`<select id="fix_month_${c.id}">${opts.map(o=>`<option value="${o.id}" ${sel&&sel.id===o.id?'selected':''}>${monthLabel(o.month)}</option>`).join('')}</select>`:`<span style="color:var(--ink-faint);font-size:12px">No ${isRent?'rent':'salary'} charges exist yet — add one on the ${isRent?'Rent':'Cook Salary'} screen first</span>`;
    return `<tr><td>${fmtD(c.date)}</td><td><b>${esc(memberName(c.memberId))}</b></td><td>${esc(c.purpose)}</td><td class="num mono">${INR(c.amount)}</td><td>${monthPicker}</td><td class="num">${opts.length?`<button class="lnk" style="color:var(--green);font-weight:600" onclick="fixStrayPayment('${c.id}')">Fix</button>`:''} <button class="lnk del" onclick="delRow('contrib','${c.id}')">Dismiss</button></td></tr>`;
  }).join('');
  return `<div class="card" style="border:1px solid var(--amber,#c08a52)"><div class="card-b">

        <p style="font-size:13px;color:var(--ink-soft);margin-bottom:10px">These were logged as plain contributions, so they correctly credited the member but did <b>not</b> reduce the Rent or Salary Payable balance — they posted against Opening Balance Equity instead. Pick the month each one was for and click <b>Fix</b> to convert it into a real payment against that charge (this also removes the stray entry).</p>
        <table style="margin-bottom:4px"><thead><tr><th>Date</th><th>Member</th><th>Purpose</th><th class="num">Amount</th><th>Applies to</th><th></th></tr></thead><tbody>${rows}</tbody></table>
      </div>
    </div>
  </div></div>`;
}
function fixStrayPayment(cid){
  const c=DB.contrib.find(x=>x.id===cid);if(!c)return;
  const isRent=c.purpose==='Rent Payment';
  const sel=document.getElementById('fix_month_'+cid);
  const targetId=sel?sel.value:'';
  const target=(isRent?DB.rent:DB.salary).find(x=>x.id===targetId);
  if(!target){toast('Pick a month first',false);return;}
  target.payments=target.payments||[];
  let pay;
  if(isRent){pay={id:uid('RP'),date:c.date,amount:+c.amount||0,paidBy:c.memberId,remarks:'Fixed from stray contribution'};target.payments.push(pay);}
  else{pay={id:uid('SP'),date:c.date,amount:+c.amount||0,paidBy:c.memberId,kind:'salary',reducesSalary:true,remarks:'Fixed from stray contribution'};target.payments.push(pay);}
  DB.contrib=DB.contrib.filter(x=>x.id!==cid);
  logAudit('update',isRent?'rentPayment':'salaryPayment',pay.id,'Stray contribution converted to a real '+(isRent?'rent':'salary')+' payment: '+INR(pay.amount)+' by '+memberName(pay.paidBy),auditSnap(c),pay);
  save();toast('Fixed — now reduces '+(isRent?'Rent':'Salary')+' Payable');render();
}

  return head+`<div class="card"><div class="card-h"><h3>Monthly Settlement Report</h3><div class="toolbar"><button class="btn ghost sm" onclick="waShareAll()">⧉ WhatsApp summary</button><button class="btn ghost sm" onclick="exportSettlement()">Excel</button><button class="btn ghost sm" onclick="exportSettlementPDF()">PDF</button></div></div>

/* ---- WhatsApp share (opens wa.me with a pre-filled message; user taps send) ---- */
function memberPhone(id){const m=DB.members.find(x=>x.id===id);if(!m)return '';let ph=((m.mobile||m.phone||'')+'').replace(/[^0-9]/g,'');if(ph.length===10)ph='91'+ph;return ph;}
function waMsgFor(r){
  const verb=r.net>0.005?('should RECEIVE ₹'+Math.round(r.net)):r.net<-0.005?('should PAY ₹'+Math.round(-r.net)):'is fully settled (₹0)';
  return `Sadda Adda — ${monthLabel(PERIOD)}\nHi ${r.name.split(' ')[0]}, your flat settlement:\n• Your share: ₹${Math.round(r.total)}\n• You paid: ₹${Math.round(r.paid)}\n• Net: you ${verb}.`;
}
function waShareMember(id){
  const st=computeSettlement();const r=st.rows.find(x=>x.id===id);if(!r)return;
  const phone=memberPhone(id);
  const url='https://wa.me/'+(phone?phone:'')+'?text='+encodeURIComponent(waMsgFor(r));
  window.open(url,'_blank');
}
function waShareAll(){
  const st=computeSettlement();
  let msg='Sadda Adda — '+monthLabel(PERIOD)+' settlement\n\n';
  st.rows.forEach(r=>{
    const verb=r.net>0.005?('receives ₹'+Math.round(r.net)):r.net<-0.005?('pays ₹'+Math.round(-r.net)):'settled';
    msg+=`• ${r.name}: ${verb}\n`;
  });
  msg+='\n(Share: your share − what you paid = net)';
  window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');
}

const WD=['Su','Mo','Tu','We','Th','Fr','Sa'];
function dowFor(p,d){const[y,m]=p.split('-').map(Number);return new Date(y,m-1,d).getDay();}
function vAttendance(){
  const tabs=`<div class="att-tabs">
    <button class="${ATT_TAB==='members'?'on':''}" onclick="ATT_TAB='members';render()">👥 Member Attendance</button>
    <button class="${ATT_TAB==='cook'?'on':''}" onclick="ATT_TAB='cook';render()">🍳 Cook Register</button>
  </div>`;
  return attStyles()+tabs+(ATT_TAB==='members'?attMembers():attCook());

/* build a month calendar grid (weeks x 7) for a given day-state function */
function calGrid(year,month,opts){
  // opts.state(d) -> 'present'|'absent'|'out' ; opts.onclick(d) -> js string or '' ; opts.locked(d)
  const total=daysInMonth(PERIOD);
  const firstDow=dowFor(PERIOD,1);
  let cells='';
  // weekday headers
  cells+='<div class="cal-head">'+WD.map(w=>`<div class="cal-wd">${w}</div>`).join('')+'</div>';
  cells+='<div class="cal-body">';
  for(let i=0;i<firstDow;i++)cells+='<div class="cal-blank"></div>';
  for(let d=1;d<=total;d++){
    const st=opts.state(d);
    const dw=dowFor(PERIOD,d);const wk=(dw===0||dw===6);
    const click=opts.onclick(d);
    const mark=st==='present'?'P':st==='absent'?'A':'·';
    cells+=`<div class="cal-cell cal-${st} ${wk?'cal-wk':''}" ${click?`onclick="${click}"`:''}>
      <span class="cal-d">${d}</span><span class="cal-mk">${mark}</span></div>`;
  }
  cells+='</div>';
  return cells;
}

function attMembers(){
  const mem=activeMembers();
  const total=daysInMonth(PERIOD);
  if(!mem.length)return '<div class="card"><div class="empty"><div class="big">▥</div>No active members this month. Add members or check the period.</div></div>';
  DB.attendance[PERIOD]=DB.attendance[PERIOD]||{};
  const[y,mo]=PERIOD.split('-').map(Number);

  const cards=mem.map(m=>{
    const att=DB.attendance[PERIOD][m.id]||{};
    const dp=daysPresent(m);
    const absent=Object.keys(att).filter(d=>att[d]===false&&!outOfTenure(m,d)).length;
    const grid=calGrid(y,mo,{
      state:d=>{ if(outOfTenure(m,d))return 'out'; return att[d]===false?'absent':'present'; },
      onclick:d=>outOfTenure(m,d)?'':`toggleAtt('${m.id}',${d})`
    });
    return `<div class="card att-card">
      <div class="att-card-h">
        <div><h3>${esc(m.name)}</h3><div class="att-sub">${dp} present · ${absent} absent · of ${total} days</div></div>
        <div class="att-card-act">
          <button class="btn ghost sm" onclick="markRow('${m.id}',true)">All present</button>
          <button class="btn ghost sm" onclick="markRow('${m.id}',false)">All absent</button>
        </div>
      </div>
      <div class="att-cal">${grid}</div>
    </div>`;
  }).join('');

  const totalDays=mem.reduce((a,m)=>a+daysPresent(m),0);
  return `<div class="note"><span class="i">i</span><span>Tap any day to flip it <b>Present ↔ Absent</b>. Days are <b>Present by default</b> — you only need to mark the absences (travel, away days). These totals drive each member's share of <b>variable expenses</b>.</span></div>
  <div class="toolbar" style="margin-bottom:16px">
    <button class="btn ghost sm" onclick="markAll(true)">✓ Everyone present all month</button>
    <div class="spacer"></div>
    <button class="btn ghost sm" onclick="exportAttendance()">Export</button>
    <label class="btn sm" style="cursor:pointer;display:inline-flex;align-items:center">Upload<input type="file" accept=".xlsx,.xls,.csv" style="display:none" onchange="uploadAttendance(this)"></label>
  </div>
  ${cards}
  <div class="att-legend"><span><i class="lg lg-p"></i> Present</span><span><i class="lg lg-a"></i> Absent</span><span><i class="lg lg-o"></i> Before joining / after leaving</span><span class="spacer"></span>Total member-days: <b class="mono">${totalDays}</b></div>`;
}
function outOfTenure(m,d){
  const ds=PERIOD+'-'+String(d).padStart(2,'0');
  if(m.joinDate&&ds<m.joinDate)return true;
  if(m.exitDate&&ds>m.exitDate)return true;
  return false;
}
function toggleAtt(id,d){
  DB.attendance[PERIOD]=DB.attendance[PERIOD]||{};
  DB.attendance[PERIOD][id]=DB.attendance[PERIOD][id]||{};
  const cur=DB.attendance[PERIOD][id][d];
  if(cur===false)DB.attendance[PERIOD][id][d]=true;
  else DB.attendance[PERIOD][id][d]=false;
  save();render();
}
function markRow(id,present){
  const total=daysInMonth(PERIOD);
  DB.attendance[PERIOD]=DB.attendance[PERIOD]||{};
  const before={...(DB.attendance[PERIOD][id]||{})};
  const o={};const m=DB.members.find(x=>x.id===id);
  for(let d=1;d<=total;d++){
    if(outOfTenure(m,d))continue;
    o[d]=present;
  }
  DB.attendance[PERIOD][id]=o;
  logAudit('update','attendance',id,monthLabel(PERIOD)+' — '+(m?m.name:id)+' marked all '+(present?'present':'absent'),before,{...o});
  save();render();
}
function markAll(present){
  activeMembers().forEach(m=>markRowSilent(m.id,present));
  save();render();toast(present?'All marked present':'All marked absent');
}
function markRowSilent(id,present){
  const total=daysInMonth(PERIOD);DB.attendance[PERIOD]=DB.attendance[PERIOD]||{};
  const o={};const m=DB.members.find(x=>x.id===id);
  for(let d=1;d<=total;d++){if(outOfTenure(m,d))continue;o[d]=present;}
  DB.attendance[PERIOD][id]=o;
}

function attCook(){
  const total=daysInMonth(PERIOD);
  DB.cookAttendance[PERIOD]=DB.cookAttendance[PERIOD]||{};
  const att=DB.cookAttendance[PERIOD];
  const[y,mo]=PERIOD.split('-').map(Number);
  const worked=cookDaysWorked()??total;
  const absent=cookAbsentDays();
  const salRow=DB.salary.filter(s=>s.month===PERIOD);
  const salAmt=salRow.reduce((a,b)=>a+(+b.amount||0),0);
  const perDay=salAmt>0?salAmt/total:0;
  const deduction=perDay*absent;

function toggleCook(d){

/* ---- attendance exports / upload ---- */
function exportAttendance(){
  const mem=activeMembers();const total=daysInMonth(PERIOD);
  if(!mem.length)return toast('No members',false);
  const rows=mem.map(m=>{
    const r={Member:m.name};
    for(let d=1;d<=total;d++){
      const ds=PERIOD+'-'+String(d).padStart(2,'0');
      const out=(m.joinDate&&ds<m.joinDate)||(m.exitDate&&ds>m.exitDate);
      const att=(DB.attendance[PERIOD]||{})[m.id]||{};
      r[d]=out?'':(att[d]===false?'A':'P');
    }
    r['Days Present']=daysPresent(m);
    return r;
  });
  dl(sheetFrom(rows,'Attendance'),`Attendance_${PERIOD}.xlsx`);toast('Attendance exported');
}
function exportCookAttendance(){
  const total=daysInMonth(PERIOD);const att=DB.cookAttendance[PERIOD]||{};
  const r={Cook:'Cook'};for(let d=1;d<=total;d++)r[d]=(att[d]===false?'A':'P');
  r['Days Worked']=cookDaysWorked()??total;
  dl(sheetFrom([r],'Cook'),`Cook_Attendance_${PERIOD}.xlsx`);toast('Cook register exported');
}
function uploadAttendance(input){
  const file=input.files&&input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const data=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{defval:''});
      if(!data.length){toast('No rows found',false);input.value='';return;}
      const total=daysInMonth(PERIOD);
      DB.attendance[PERIOD]=DB.attendance[PERIOD]||{};
      const keys=Object.keys(data[0]);
      const nameKey=keys.find(k=>/member|name/i.test(k))||keys[0];
      let matched=0,unmatched=[];
      data.forEach(row=>{
        const nm=(''+(row[nameKey]||'')).trim();if(!nm)return;
        const m=DB.members.find(x=>x.name.trim().toLowerCase()===nm.toLowerCase());
        if(!m){unmatched.push(nm);return;}
        const o={};
        for(let d=1;d<=total;d++){
          const cell=(''+(row[d]!=null?row[d]:row[String(d)]||'')).trim().toUpperCase();
          if(cell==='')continue;
          if(['A','0','ABSENT','N'].includes(cell))o[d]=false;
          else if(['P','1','PRESENT','Y'].includes(cell))o[d]=true;
        }
        DB.attendance[PERIOD][m.id]=o;matched++;
      });
      save();render();
      toast(matched+' member'+(matched!==1?'s':'')+' updated'+(unmatched.length?' · '+unmatched.length+' unmatched':''),matched>0);
    }catch(err){toast('Could not read file',false);}
    input.value='';
  };
  reader.readAsArrayBuffer(file);
}

function uploadOpeningContrib(input){
  const file=input.files&&input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const data=XLSX.utils.sheet_to_json(ws,{defval:''});
      if(!data.length){toast('No rows found in file',false);input.value='';return;}
      const keys=Object.keys(data[0]);
      const nameKey=keys.find(k=>/member|name|account/i.test(k))||keys[0];
      const amtKey=keys.find(k=>/open|contrib|amount|balance/i.test(k))||keys[1];
      DB.opening=DB.opening||{date:'',petty:0,kirana:0,rentPayable:0,members:{}};
      DB.opening.members=DB.opening.members||{};
      let matched=0,accts=0,unmatched=[];
      data.forEach(r=>{
        const nm=(''+(r[nameKey]||'')).trim();if(!nm)return;
        const amt=+(''+r[amtKey]).replace(/[^0-9.\-]/g,'')||0;
        const low=nm.toLowerCase();
        // account-level rows
        if(/petty/.test(low)){DB.opening.petty=amt;accts++;return;}
        if(/kirana/.test(low)){DB.opening.kirana=amt;accts++;return;}
        if(/rent/.test(low)){DB.opening.rentPayable=amt;accts++;return;}
        if(/salary|cook/.test(low)){DB.opening.salaryPayable=amt;accts++;return;}
        const m=DB.members.find(x=>x.name.trim().toLowerCase()===low);
        if(m){DB.opening.members[m.id]=amt;matched++;}else unmatched.push(nm);
      });
      save();render();
      toast(matched+' member'+(matched!==1?'s':'')+(accts?' · '+accts+' account'+(accts!==1?'s':''):'')+(unmatched.length?' · '+unmatched.length+' unmatched':''),matched+accts>0);
    }catch(err){toast('Could not read file',false);}
    input.value='';
  };
  reader.readAsArrayBuffer(file);
}

/* ---------- JOURNAL ---------- */
function vJournal(){
  const J=buildJournal().filter(en=>BOOK_SCOPE==='period'?inPeriod(en.date,PERIOD):en.date<=periodEnd());
  if(!J.length)return bookScopeBar()+'<div class="card"><div class="empty"><div class="big">≣</div>No journal entries in this scope.</div></div>';
  let tdr=0,tcr=0;
  const blocks=J.map(en=>{
    const ed=en.lines.reduce((a,l)=>a+l.dr,0), ec=en.lines.reduce((a,l)=>a+l.cr,0);
    tdr+=ed;tcr+=ec;
    const lines=en.lines.map((l,i)=>`<tr><td style="padding-left:${l.dr>0?'14':'34'}px">${l.dr>0?'':'<span style="color:var(--ink-faint)">To </span>'}${esc(l.acct.name)}</td><td class="num mono">${l.dr>0?INR(l.dr):''}</td><td class="num mono">${l.cr>0?INR(l.cr):''}</td></tr>`).join('');

/* ---------- INCOME & EXPENDITURE ---------- */
function vIncome(){
  // scope: period activity or cumulative
  const accts=Object.values(buildLedger(scopeOpts()));
  const exp=accts.filter(a=>a.acct.type==='EXPENSE');
  const expRows=exp.map(a=>({name:a.acct.name,gross:a.dr,recovered:a.cr,net:a.dr-a.cr})).filter(r=>r.gross>0.005||r.recovered>0.005);
  const grossTot=expRows.reduce((a,r)=>a+r.gross,0);
  const recTot=expRows.reduce((a,r)=>a+r.recovered,0);
  const net=grossTot-recTot;
  const body=expRows.map(r=>`<tr><td>${esc(r.name)}</td><td class="num mono">${INR(r.gross)}</td><td class="num mono">${INR(r.recovered)}</td><td class="num mono ${Math.abs(r.net)<0.005?'':'neg'}">${INR(r.net)}</td></tr>`).join('');
  return bookScopeBar(`<button class="btn ghost sm" onclick="exportIncome()">Export</button>`)+
  `<div class="note"><span class="i">i</span><span>This is a <b>cost-sharing pool</b>, not a business — there is no profit. Gross household costs are fully <b>recovered from members</b> via share allocation, so the net should be ~nil once a month is allocated.</span></div>
  <div class="card"><div class="card-h"><h3>Income &amp; Expenditure — ${BOOK_SCOPE==='period'?monthLabel(PERIOD):'up to '+monthLabel(PERIOD)}</h3></div>
    <div class="card-b" style="padding:0"><table><thead><tr><th>Head</th><th class="num">Gross Cost</th><th class="num">Recovered from Members</th><th class="num">Net</th></tr></thead>
    <tbody>${body||'<tr><td colspan="4" class="empty">No costs in this scope.</td></tr>'}</tbody>
    <tfoot class="ledger-foot"><tr><td>Total</td><td class="num mono">${INR(grossTot)}</td><td class="num mono">${INR(recTot)}</td><td class="num mono">${INR(net)}</td></tr></tfoot></table></div></div>`;
}

/* ---------- BALANCE SHEET ---------- */
function vBalance(){
  const accts=Object.values(buildLedger({upto:periodEnd()}));
  const grp=t=>accts.filter(a=>a.acct.type===t).map(a=>{const net=a.dr-a.cr;const bal=a.acct.normal==='Dr'?net:-net;return {name:a.acct.name,bal};}).filter(r=>Math.abs(r.bal)>0.005);
  const assets=grp('ASSET');
  const liab=grp('LIABILITY');
  // equity = member current accounts + opening equity; expenses/income net into equity if unallocated
  const equity=grp('EQUITY');
  // residual surplus/deficit (unallocated expenses) folds into equity for the BS to balance
  const expNet=accts.filter(a=>a.acct.type==='EXPENSE'||a.acct.type==='INCOME').reduce((a,x)=>a+(x.dr-x.cr),0); // Dr positive = unrecovered cost
  const assetTot=assets.reduce((a,r)=>a+r.bal,0);
  const liabTot=liab.reduce((a,r)=>a+r.bal,0);
  let equityTot=equity.reduce((a,r)=>a+r.bal,0);
  // unallocated cost reduces equity (it's a deficit not yet borne by members)
  const surplusDeficit=-expNet; // negative if costs unrecovered
  const equityShown=equity.slice();
  if(Math.abs(surplusDeficit)>0.005)equityShown.push({name:'Unallocated surplus/(deficit)',bal:surplusDeficit});
  equityTot+=surplusDeficit;
  const side=(title,rows,tot)=>`<div class="card"><div class="card-h"><h3>${title}</h3></div><div class="card-b" style="padding:0"><table><tbody>${rows.length?rows.map(r=>`<tr><td>${esc(r.name)}</td><td class="num mono ${r.bal<0?'neg':''}">${INR(r.bal)}</td></tr>`).join(''):'<tr><td class="empty" colspan="2">—</td></tr>'}</tbody><tfoot class="ledger-foot"><tr><td>Total</td><td class="num mono">${INR(tot)}</td></tr></tfoot></table></div></div>`;
  const lhsTot=liabTot+equityTot;
  const balanced=Math.abs(assetTot-lhsTot)<0.01;
  return `<div class="toolbar" style="margin-bottom:16px"><div class="bal-strip"><span>As at <b>${fmtD(periodEnd())}</b></span></div><div class="spacer"></div>${balanced?'<span class="pill green">Balanced ✓</span>':`<span class="pill red">Out by ${INR(Math.abs(assetTot-lhsTot))}</span>`}<button class="btn ghost sm" onclick="exportBalance()">Export</button></div>
  <div class="split2">
    ${side('Assets',assets,assetTot)}
    <div>${side('Liabilities',liab,liabTot)}${side("Members' Funds & Equity",equityShown,equityTot)}</div>
  </div>
  <div class="note"><span class="i">i</span><span>A member's current-account <b>credit</b> balance means the flat owes them (they should receive); a <b>debit</b> balance means they owe the flat. These mirror the Monthly Settlement net figures.</span></div>`;
}

    <p style="font-size:13.5px;color:var(--ink-soft);margin-bottom:14px">Add the <b>Google account email</b> of every person who should be able to see this flat's data. Once you add even one email, sign-in becomes <b>required</b> — every device (including yours) must sign in with Google using an allowed email; anonymous and email/password sign-in stop working, and the Firestore rules below must also be updated to enforce this on the server. Leave this empty to keep the old behaviour (anyone with the flat code + config).</p>

  </div></div>`;

  return statusCard+setupCard+allowCard+guide+`<div class="note"><span class="i">i</span><span><b>How concurrent edits behave:</b> changes sync within about a second and everyone's screen refreshes automatically. If two people edit at the very same moment, the later save wins for that one record — so for heavy data-entry it's smoothest if one person enters at a time. Day-to-day flat use is well within this.</span></div>`;

function allowlistAdd(){
  const email=val('al_email').trim().toLowerCase();
  if(!email||!email.includes('@')){toast('Enter a valid email',false);return;}
  const list=getAllowlist();
  if(list.includes(email)){toast('Already on the list',false);return;}
  list.push(email);setAllowlist(list);
  logAudit('update','settings','allowlist','Added '+email+' to the access allow-list',null,{added:email});
  toast('Added — remember to update the Firestore rules below');render();
}
function allowlistRemove(email){
  confirmDel('Remove '+email+' from the allow-list? They will no longer be able to sign in once you update the Firestore rules too.',()=>{
    setAllowlist(getAllowlist().filter(e=>e!==email));
    logAudit('update','settings','allowlist','Removed '+email+' from the access allow-list',{removed:email},null);
    toast('Removed — remember to update the Firestore rules below');render();
  });
}
function cloudConnect(){
  const raw=val('cl_cfg').trim();const flat=val('cl_flat').trim();
  if(!raw){toast('Paste your Firebase config',false);return;}
  if(!flat){toast('Pick a flat code',false);return;}
  let cfg;
  try{
    // accept either pure JSON or a JS object literal
    cfg=JSON.parse(raw);
  }catch(e){
    try{cfg=Function('return ('+raw+')')();}catch(e2){toast('Config is not valid — paste the whole { } block',false);return;}
  }
  if(!cfg.apiKey||!cfg.projectId){toast('Config missing apiKey/projectId',false);return;}
  localStorage.setItem(CFG_KEY,JSON.stringify(cfg));
  localStorage.setItem(FLAT_KEY,flat);
  setSync('saving');
  connectCloud().then(ok=>{
    if(ok){toast('Connected — syncing live');render();}
    else toast('Could not connect — check config & rules',false);
  });
}
function cloudEmailAuth(mode){
  if(!fb.auth){toast('Connect first',false);return;}
  const email=val('cl_email').trim(),pass=val('cl_pass');
  if(!email||!pass){toast('Enter email and password',false);return;}
  const p=mode==='up'?fb.auth.createUserWithEmailAndPassword(email,pass):fb.auth.signInWithEmailAndPassword(email,pass);
  p.then(()=>{toast(mode==='up'?'Account created':'Signed in');render();}).catch(e=>toast(e.message,false));
}

/* ---------- AUDIT & VERIFY ---------- */
let AUDIT_SCOPE='period';
function vAudit(){
  const p=AUDIT_SCOPE==='period'?PERIOD:null;
  const items=allAuditItems(p);
  const verified=items.filter(i=>isVerified(i.id)).length;
  const pct=items.length?Math.round(verified/items.length*100):100;

  // ---- consistency checks (recheck the figures) ----
  const checks=[];
  const eom=periodEnd();
  // 1. every journal entry balanced
  let unbal=0;buildJournal().forEach(en=>{const d=en.lines.reduce((a,l)=>a+l.dr,0),c=en.lines.reduce((a,l)=>a+l.cr,0);if(Math.abs(d-c)>0.01)unbal++;});
  checks.push({ok:unbal===0,name:'Every journal entry balances (Dr = Cr)',detail:unbal===0?'All entries balanced':unbal+' entr'+(unbal===1?'y is':'ies are')+' unbalanced'});
  // 2. trial balance balances
  const tb=trialBalance(eom);const tbDiff=Math.abs(tb.tdr-tb.tcr);
  checks.push({ok:tbDiff<0.01,name:'Trial balance agrees',detail:tbDiff<0.01?'Debits = Credits = '+INR(tb.tdr):'Out by '+INR(tbDiff)});
  // 3. balance sheet balances (A = L + E incl. unallocated)
  const accts=Object.values(buildLedger({upto:eom}));
  const sum=t=>accts.filter(a=>a.acct.type===t).reduce((s,a)=>{const net=a.dr-a.cr;return s+(a.acct.normal==='Dr'?net:-net);},0);
  const A=sum('ASSET'),L=sum('LIABILITY'),E=sum('EQUITY');
  const expNet=accts.filter(a=>a.acct.type==='EXPENSE'||a.acct.type==='INCOME').reduce((s,a)=>s+(a.dr-a.cr),0);
  const bsDiff=Math.abs(A-(L+E-expNet));
  checks.push({ok:bsDiff<0.01,name:'Balance sheet balances (Assets = Liabilities + Equity)',detail:bsDiff<0.01?'Assets '+INR(A):'Out by '+INR(bsDiff)});
  // 4. petty cash never implies impossible (informational: negative balance)
  const petty=pettyBalance(eom);
  checks.push({ok:petty>=-0.01,name:'Petty cash balance not negative',detail:petty>=-0.01?INR(petty)+' in hand':'Overdrawn by '+INR(-petty)+' — check entries'});
  // 5. member current accounts match settlement nets (this period)
  const st=computeSettlement(PERIOD);
  const led=buildLedger({upto:eom});
  let memMismatch=0;
  st.rows.forEach(r=>{const k=Object.keys(led).find(key=>led[key].acct.member===r.id);if(k){const a=led[k];const bal=-(a.dr-a.cr);/* but settlement net is period-only; skip strict equality across periods */}});
  // 6. settlement internal: sum of shares == total pool (this period)
  const shareSum=st.rows.reduce((a,r)=>a+r.total,0);
  const poolDiff=Math.abs(shareSum-(st.grand+st.rows.reduce((a,r)=>a+(r.othS||0),0)));
  checks.push({ok:poolDiff<0.5,name:'Member shares add up to the costs for '+monthLabel(PERIOD),detail:poolDiff<0.5?'Shares total '+INR(shareSum):'Out by '+INR(poolDiff)});
  // 7. kirana & rent & salary payables not negative (overpaid is allowed but flag)
  const kb=kiranaBalance(eom);
  checks.push({ok:kb>=-0.01,name:'Kirana payable not negative',detail:kb>=-0.01?INR(kb)+' outstanding':'Overpaid by '+INR(-kb)});

  const allOk=checks.every(c=>c.ok);

  const checkRows=checks.map(c=>`<tr><td style="width:34px">${c.ok?'<span class="pill green" style="padding:2px 7px">✓</span>':'<span class="pill red" style="padding:2px 7px">!</span>'}</td><td>${c.name}</td><td class="num mono" style="color:var(--ink-soft)">${c.detail}</td></tr>`).join('');

  // per-ledger verification breakdown
  const byKind={};
  items.forEach(i=>{byKind[i.kind]=byKind[i.kind]||{n:0,v:0};byKind[i.kind].n++;if(isVerified(i.id))byKind[i.kind].v++;});
  const kindRows=Object.entries(byKind).sort().map(([k,o])=>`<tr><td>${esc(k)}</td><td class="num">${o.v} / ${o.n}</td><td style="width:140px"><div style="height:7px;background:#efeae0;border-radius:4px;overflow:hidden"><div style="height:100%;width:${o.n?o.v/o.n*100:0}%;background:var(--teal)"></div></div></td></tr>`).join('');

  // unverified entries list
  const unver=items.filter(i=>!isVerified(i.id)).sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  const unverRows=unver.map(i=>`<tr><td class="audit-c">${tickCell(i.id)}</td><td>${fmtD(i.date)}</td><td><span class="pill gray">${esc(i.kind)}</span></td><td>${esc(i.label)}</td><td class="num mono">${INR(i.amount)}</td></tr>`).join('');

  return `<div class="toolbar" style="margin-bottom:16px">
      <div class="seg"><button class="${AUDIT_SCOPE==='period'?'on':''}" onclick="AUDIT_SCOPE='period';render()">${monthLabel(PERIOD)}</button><button class="${AUDIT_SCOPE==='all'?'on':''}" onclick="AUDIT_SCOPE='all';render()">All time</button></div>
      <div class="spacer"></div>
      <button class="btn ghost sm" onclick="auditMarkAll(true)">Verify all shown</button>
      <button class="btn ghost sm" onclick="auditMarkAll(false)">Clear all ticks</button>
    </div>

  <div class="tiles" style="grid-template-columns:repeat(3,1fr)">
    <div class="tile"><div class="edge" style="background:${allOk?'var(--teal)':'var(--red)'}"></div><div class="lab">Consistency Check</div><div class="val" style="font-size:19px;color:${allOk?'var(--green)':'var(--red)'}">${allOk?'All checks passed':'Needs attention'}</div><div class="meta">${checks.filter(c=>c.ok).length} of ${checks.length} checks OK</div></div>
    <div class="tile"><div class="lab">Entries Verified</div><div class="val mono">${verified} / ${items.length}</div><div class="meta">${pct}% ticked off</div></div>
    <div class="tile"><div class="lab">Scope</div><div class="val" style="font-size:19px">${AUDIT_SCOPE==='period'?monthLabel(PERIOD):'All time'}</div><div class="meta">${items.length} entries</div></div>
  </div>

  <div class="card"><div class="card-h"><h3>Figure Re-Check</h3><span class="hint">automated consistency tests</span></div>
    <div class="card-b" style="padding:0"><table><tbody>${checkRows}</tbody></table></div></div>

  <div class="card"><div class="card-h"><h3>Verification Progress by Ledger</h3></div>
    <div class="card-b" style="padding:0"><table><thead><tr><th>Ledger</th><th class="num">Verified</th><th></th></tr></thead><tbody>${kindRows||'<tr><td colspan="3" class="empty">No entries in scope.</td></tr>'}</tbody></table></div></div>

  <div class="card"><div class="card-h"><h3>Entries Awaiting Verification</h3>${unver.length?`<span class="hint">${unver.length} unchecked</span>`:'<span class="pill green">All checked ✓</span>'}</div>
    <div class="card-b" style="padding:0">${unver.length?`<table><thead><tr><th class="audit-h">✓</th><th>Date</th><th>Type</th><th>Particulars</th><th class="num">Amount</th></tr></thead><tbody>${unverRows}</tbody></table>`:'<div class="empty"><div class="big">✓</div>Every entry in this scope has been verified.</div>'}</div></div>

  <div class="note"><span class="i">i</span><span>The <b>tick mark</b> next to any entry (here and on every ledger) lets you mark it as personally checked — purely a review aid, it doesn't change any figures. The <b>Figure Re-Check</b> above independently re-verifies that the books are internally consistent (debits equal credits, balances reconcile). A failed check points to a data problem worth investigating.</span></div>`;
}
function auditMarkAll(on){
  const p=AUDIT_SCOPE==='period'?PERIOD:null;
  const items=allAuditItems(p);
  DB.audit=DB.audit||{verified:{}};DB.audit.verified=DB.audit.verified||{};
  if(on)items.forEach(i=>DB.audit.verified[i.id]=true);

function assetBalance(a,upto){
  return (a.movements||[]).reduce((s,mv)=>{
    if(upto&&mv.date>upto)return s;
    const amt=+mv.amount||0;
    if(mv.kind==='add')return s+amt;
    if(mv.kind==='refund')return s-amt;
    return s+amt; // adjust: signed
  },0);
}
